<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quick safety topics for meeting openers. Curated from OSHA, DOE, and NIOSH public-domain content.">
  <title>SafetyTopic — Quick Meeting Safety Briefs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="brand" id="brand-link">
        <span class="brand-mark" aria-hidden="true">✦</span>
        <span class="brand-name">SafetyTopic</span>
      </a>
      <p class="tagline">Quick safety briefs for meeting openers</p>
      <nav style="margin-left:auto">
        <a href="browse.html" class="btn btn-ghost" style="font-size:0.82rem;padding:6px 14px;color:#fff;border-color:rgba(255,255,255,0.35)">Browse All →</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="controls" aria-label="Topic controls">
      <div class="control-group">
        <label for="category-select" class="control-label">Category</label>
        <select id="category-select" class="select">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="control-actions">
        <button id="new-topic-btn" class="btn btn-primary" type="button">
          <span aria-hidden="true">↻</span> Get a Topic
        </button>
      </div>
    </section>

    <article id="topic-card" class="topic-card" aria-live="polite">
      <!-- Topic rendered here by app.js -->
    </article>

    <section class="share-bar" aria-label="Share and export">
      <button id="copy-text-btn" class="btn btn-ghost" type="button">
        <span aria-hidden="true">📋</span> Copy Text
      </button>
      <button id="copy-link-btn" class="btn btn-ghost" type="button">
        <span aria-hidden="true">🔗</span> Copy Link
      </button>
      <button id="print-btn" class="btn btn-ghost" type="button">
        <span aria-hidden="true">🖨</span> Print
      </button>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <footer class="site-footer">
    <p>
      Content curated from public-domain sources:
      <a href="https://www.osha.gov" target="_blank" rel="noopener">OSHA</a>,
      <a href="https://www.energy.gov/ehss" target="_blank" rel="noopener">DOE EHSS</a>,
      and <a href="https://www.cdc.gov/niosh" target="_blank" rel="noopener">NIOSH</a>.
      Always defer to your site-specific safety procedures.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
